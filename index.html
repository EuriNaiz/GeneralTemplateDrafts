<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fundación</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="header">
    <div class="container-fluid header-inner"> 
      <a href="#" class="logo">
        <img src="assets/icons/logo.svg" alt="Logo">
      </a>

      <nav class="nav">
        <a href="#">Fundación</a>
        <a href="#">Donar</a>
        <a href="#">Información</a>

        <a href="#"><img src="assets/icons/post.svg" alt="Post"></a>
        <a href="#"><img src="assets/icons/mail.svg" alt="Mail"></a>
        <a href="#"><img src="assets/icons/theme.svg" alt="Theme"></a>
      </nav>
    </div>
  </header>

  <section class="slider container">
    <div class="slider-window">
      <div class="slides">
        <div class="slide">
          <img src="assets/slider.jpg" alt="Slide 1">
        </div>
        <div class="slide">
          <img src="assets/slider2.jpg" alt="Slide 2">
        </div>
        <div class="slide">
          <img src="assets/slider3.jpg" alt="Slide 3">
        </div>
        </div>
    </div>

    <div class="arrows">
      <button class="arrow prev" aria-label="Anterior">
        <img src="assets/icons/arrow-left.svg" alt="Anterior">
      </button>
      <button class="arrow next" aria-label="Siguiente">
        <img src="assets/icons/arrow-right.svg" alt="Siguiente">
      </button>
    </div>

    <div class="dots"></div>
  </section>

  <section class="news container">
    <h2>Novedades</h2>

    <article class="post">
      <div class="post-header">
        <img class="avatar" src="assets/avatar.jpg" alt="Avatar">
        <span class="username"><b>username</b></span>
      </div>

      <p class="post-text">
        Se supone que este es un post de tumblr xd, a ver qué tal c ve esta mierda
      </p>

      <div class="post-footer">
        <div class="meta">
          <span>Source: username</span>
          <span><b>1 year ago</b> with <b>52,927 notes</b></span>
        </div>
        <div class="post-icons">
          <img src="assets/icons/reblog.svg" alt="Reblog">
          <img src="assets/icons/like.svg" alt="Like">
        </div>
      </div>
    </article>
  </section>

  <section class="container">
    <div class="grid-4">
      <div class="card square"><img src="assets/scard.jpg" alt="Card Cuadrada"></div>
      <div class="card square"><img src="assets/scard.jpg" alt="Card Cuadrada"></div>
      <div class="card square"><img src="assets/scard.jpg" alt="Card Cuadrada"></div>
      <div class="card square"><img src="assets/scard.jpg" alt="Card Cuadrada"></div>
    </div>
  </section>

  <section class="container">
    <div class="grid-2">
      <div class="card panoramic"><img src="assets/rcard.jpg" alt="Card Panorámica"></div>
      <div class="card panoramic"><img src="assets/rcard.jpg" alt="Card Panorámica"></div>
    </div>
  </section>

  <footer class="footer">
    <a href="#"><img src="assets/icons/tumblr.svg" alt="Tumblr"></a>
    <a href="#"><img src="assets/icons/instagram.svg" alt="Instagram"></a>
    <a href="#"><img src="assets/icons/bluesky.svg" alt="Bluesky"></a>
  </footer>

  <script src="js/slider.js"></script>
</body>
</html>
